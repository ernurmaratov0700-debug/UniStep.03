<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniStep - Ethno Pro</title>
    <meta name="theme-color" content="#1e293b">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIlVuaVN0ZXAgVWx0aW1hdGUiLAogICJzaG9ydF9uYW1lIjogIlVuaVN0ZXAiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzFlMjkzYiIsCiAgInRoZW1lX2NvbG9yIjogIiMxZTI5M2IiCn0=">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1e293b; --secondary: #3b82f6; --accent: #f59e0b;
            --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b;
            --ornament: rgba(30, 41, 59, 0.05);
        }

        [data-theme="dark"] {
            --primary: #0f172a; --secondary: #60a5fa; --bg: #0f172a; 
            --card-bg: #1e293b; --text: #e2e8f0; --ornament: rgba(255, 255, 255, 0.05);
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); color: var(--text); 
            transition: 0.3s; margin: 0; padding-bottom: 50px;
            /* ETHNO-STYLE BACKGROUND */
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0C45 15 35 25 25 25C15 25 5 15 10 0M40 0C35 15 45 25 55 25C65 25 75 15 70 0' fill='none' stroke='%233b82f6' stroke-opacity='0.1' stroke-width='1'/%3E%3C/svg%3E");
        }

        /* ETHNO BORDER - "Қошқар мүйіз" стиліндегі сызық */
        .ethno-border {
            border-top: 4px solid transparent;
            border-image: url("data:image/svg+xml,%3Csvg width='100' height='20' viewBox='0 0 100 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 10 Q 12.5 0, 25 10 T 50 10 T 75 10 T 100 10' fill='none' stroke='%23f59e0b' stroke-width='2'/%3E%3C/svg%3E") 30 repeat;
        }

        /* PROGRESS CIRCLE */
        .progress-circle {
            width: 120px; height: 120px;
            background: radial-gradient(closest-side, var(--primary) 79%, transparent 80% 100%),
                        conic-gradient(var(--accent) calc(var(--progress) * 1%), var(--secondary) 0);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 15px auto;
        }

        .hero { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white; border-radius: 0 0 40px 40px; padding: 30px 20px; text-align: center;
            position: relative; overflow: hidden;
        }

        .hero::before {
            content: ""; position: absolute; top: -10px; right: -10px; width: 100px; height: 100px;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 10 Q70 10 70 30 T50 50 T30 30 T50 10' fill='white' fill-opacity='0.1'/%3E%3C/svg%3E");
            transform: rotate(45deg);
        }

        .stat-card { 
            background: var(--card-bg); border-radius: 20px; padding: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); text-align: center; transition: 0.3s;
        }

        .section-page { display: none; padding: 20px; }
        .active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .lang-btn { font-size: 0.8rem; padding: 2px 8px; border-radius: 5px; cursor: pointer; border: 1px solid white; }
    </style>
</head>
<body>

    <div id="auth-screen" style="height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="card p-4 shadow-lg text-center ethno-border" style="width: 320px; border-radius: 25px;">
            <h2 class="fw-bold text-primary mb-3">UniStep</h2>
            <input type="text" id="user-login" class="form-control mb-2" placeholder="Login">
            <button onclick="handleAuth()" class="btn btn-primary w-100 mt-2">Кіру / Enter</button>
        </div>
    </div>

    <div id="main-app" style="display:none">
        <div class="top-nav p-3 d-flex justify-content-between align-items-center bg-dark text-white">
            <div id="welcome-user">UniStep</div>
            <div class="d-flex gap-2 align-items-center">
                <span class="lang-btn" onclick="changeLang('kk')">KK</span>
                <span class="lang-btn" onclick="changeLang('ru')">RU</span>
                <span class="lang-btn" onclick="changeLang('en')">EN</span>
                <i class="fas fa-moon ms-2" onclick="toggleTheme()" style="cursor:pointer"></i>
            </div>
        </div>

        <div id="home" class="section-page active">
            <div class="hero">
                <h3 id="t-hero-title">Цифрлық Ментор</h3>
                <div class="progress-circle" id="exam-progress-ui" style="--progress: 0">
                    <div class="text-white text-center">
                        <small id="t-exam-left">Күндер</small><br>
                        <span id="days-val" class="h4 fw-bold">0</span>
                    </div>
                </div>
                <p id="daily-quote" class="small italic opacity-75"></p>
            </div>

            <div class="container mt-4">
                <div class="stat-card mb-4 ethno-border">
                    <h6 class="fw-bold" id="t-mood-title">Көңіл-күйің қалай?</h6>
                    <div class="d-flex justify-content-around my-3">
                        <span style="cursor:pointer; font-size: 1.5rem;" onclick="saveMood(100)">😊</span>
                        <span style="cursor:pointer; font-size: 1.5rem;" onclick="saveMood(70)">😐</span>
                        <span style="cursor:pointer; font-size: 1.5rem;" onclick="saveMood(40)">🤯</span>
                    </div>
                    <div id="mood-report" class="small text-success fw-bold"></div>
                </div>

                <div class="row g-3">
                    <div class="col-6"><div class="stat-card" onclick="openSection('schedule')"><i class="fas fa-calendar-alt text-primary mb-2"></i><br><small id="t-menu-1">Кесте</small></div></div>
                    <div class="col-6"><div class="stat-card" onclick="openSection('settings')"><i class="fas fa-cog text-secondary mb-2"></i><br><small id="t-menu-2">Баптаулар</small></div></div>
                </div>
            </div>
        </div>

        <div id="settings" class="section-page">
            <div class="container">
                <h4 onclick="backToHome()"><i class="fas fa-arrow-left me-2"></i> Back</h4>
                <div class="stat-card mt-4">
                    <h5 id="t-backup-title">Деректерді басқару</h5>
                    <button class="btn btn-outline-primary w-100 mb-2" onclick="exportData()">💾 Экспорт (JSON)</button>
                    <input type="file" id="importFile" hidden onchange="importData(this)">
                    <button class="btn btn-outline-success w-100" onclick="document.getElementById('importFile').click()">📂 Импорт</button>
                </div>
                <div class="text-center mt-5">
                    <button class="btn btn-danger btn-sm" onclick="logout()">Шығу / Logout</button>
                </div>
            </div>
        </div>

        <div id="schedule" class="section-page">
            <div class="container">
                <h4 onclick="backToHome()"><i class="fas fa-arrow-left me-2"></i> <span id="t-menu-1-back">Кесте</span></h4>
                <div class="stat-card mt-3">
                    <input type="date" id="exam-date" class="form-control mb-2" onchange="saveExamDate()">
                    <small class="text-muted">Сессия күнін таңдаңыз</small>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- LOCALIZATION DATA ---
        const langData = {
            kk: { hero: "Цифрлық Ментор", mood: "Көңіл-күйің қалай?", menu1: "Кесте", menu2: "Баптаулар", backup: "Деректерді сақтау", left: "Күн қалды", report: "Осы аптада көңіл-күйің " },
            ru: { hero: "Цифровой Ментор", mood: "Как ваше настроение?", menu1: "Расписание", menu2: "Настройки", backup: "Управление данными", left: "Дней осталось", report: "На этой неделе настроение " },
            en: { hero: "Digital Mentor", mood: "How is your mood?", menu1: "Schedule", menu2: "Settings", backup: "Data Management", left: "Days left", report: "This week your mood was " }
        };

        let currentLang = localStorage.getItem('app_lang') || 'kk';

        function changeLang(lang) {
            currentLang = lang;
            localStorage.setItem('app_lang', lang);
            updateUI();
        }

        function updateUI() {
            const t = langData[currentLang];
            document.getElementById('t-hero-title').innerText = t.hero;
            document.getElementById('t-mood-title').innerText = t.mood;
            document.getElementById('t-menu-1').innerText = t.menu1;
            document.getElementById('t-menu-1-back').innerText = t.menu1;
            document.getElementById('t-menu-2').innerText = t.menu2;
            document.getElementById('t-backup-title').innerText = t.backup;
            document.getElementById('t-exam-left').innerText = t.left;
        }

        // --- AUTH & THEME ---
        function handleAuth() {
            const login = document.getElementById('user-login').value;
            if(login) {
                sessionStorage.setItem('user', login);
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                init();
            }
        }

        function toggleTheme() {
            const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', theme);
        }

        // --- MOOD ANALYTICS ---
        function saveMood(score) {
            let moods = JSON.parse(localStorage.getItem('mood_history') || '[]');
            moods.push({score, date: new Date().toISOString()});
            if(moods.length > 7) moods.shift();
            localStorage.setItem('mood_history', JSON.stringify(moods));
            
            const avg = Math.round(moods.reduce((a,b) => a + b.score, 0) / moods.length);
            document.getElementById('mood-report').innerText = langData[currentLang].report + avg + "%!";
        }

        // --- PROGRESS CIRCLES ---
        function saveExamDate() {
            const date = document.getElementById('exam-date').value;
            localStorage.setItem('exam_date', date);
            calcProgress();
        }

        function calcProgress() {
            const target = new Date(localStorage.getItem('exam_date'));
            if(!target.getTime()) return;
            
            const now = new Date();
            const diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
            
            document.getElementById('days-val').innerText = diff > 0 ? diff : 0;
            // Прогресс барын 30 күнге шақтап есептеу (мысалы)
            const percent = Math.max(0, Math.min(100, (diff / 30) * 100));
            document.getElementById('exam-progress-ui').style.setProperty('--progress', 100 - percent);
        }

        // --- BACKUP & RESTORE ---
        function exportData() {
            const data = JSON.stringify(localStorage);
            const blob = new Blob([data], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `UniStep_Backup_${new Date().toLocaleDateString()}.json`;
            a.click();
        }

        function importData(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function() {
                const data = JSON.parse(reader.result);
                Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
                alert("Деректер сәтті жүктелді! / Data restored!");
                location.reload();
            };
            reader.readAsText(file);
        }

        // --- APP NAVIGATION ---
        function openSection(id) {
            document.querySelectorAll('.section-page').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function backToHome() { openSection('home'); }
        function logout() { sessionStorage.clear(); location.reload(); }

        function init() {
            updateUI();
            calcProgress();
            document.getElementById('daily-quote').innerText = "Өзіңе сен өзіңді алып шығар-еңбегің мен ниетің екі жақтап💪";
        }

        window.onload = () => {
            if(sessionStorage.getItem('user')) handleAuth();
        };
    </script>
</body>
</html>
