<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* СІЗ ЖІБЕРГЕН СТИЛЬДЕР ОСЫ ЖЕРДЕ */
        :root { 
            --primary: #1e293b; --secondary: #3b82f6; --accent: #f59e0b;
            --bg: #f8fafc; --card-bg: #ffffff; --text: #1e293b;
            --muted: #64748b;
        }

        [data-theme="dark"] {
            --primary: #0f172a; 
            --secondary: #60a5fa; 
            --bg: #0f172a; 
            --card-bg: #1e293b; 
            --text: #f1f5f9;
            --muted: #94a3b8;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            transition: 0.3s; 
            margin: 0; 
            padding-bottom: 30px; 
        }
        
        [data-theme="dark"] .s-card, 
        [data-theme="dark"] .list-item, 
        [data-theme="dark"] .stat-card,
        [data-theme="dark"] .link-item,
        [data-theme="dark"] h3, 
        [data-theme="dark"] h5, 
        [data-theme="dark"] h6,
        [data-theme="dark"] b {
            color: var(--text) !important;
        }

        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .auth-card { 
            width: 90%; max-width: 400px; padding: 30px; 
            background: var(--card-bg); border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; 
        }

        .top-nav { background: var(--primary); color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .hero { min-height: 25vh; background: linear-gradient(135deg, #2a3a50 30%, var(--secondary) 90%); color: white; border-radius: 0 0 40px 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        
        .timer-box { display: block; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); padding: 12px 20px; border-radius: 20px; margin-top: 15px; border: 1px solid rgba(255,255,255,0.2); width: fit-content; color: white; }

        .section-page { display: none; animation: fadeIn 0.4s ease; padding: 25px 15px; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .stat-card { 
            border: none; border-radius: 20px; padding: 15px; 
            background: var(--card-bg); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            cursor: pointer; text-align: center; transition: 0.3s; 
            color: var(--text);
            height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .stat-card:hover { transform: translateY(-5px); background: var(--secondary); color: white !important; }

        .s-card { background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .back-btn { font-size: 24px; cursor: pointer; margin-right: 15px; color: var(--text); border: none; background: none; }
        
        .link-item { 
            display: flex; align-items: center; padding: 15px; 
            background: rgba(125,125,125,0.1); 
            border-radius: 15px; margin-bottom: 12px; 
            text-decoration: none; color: var(--text); 
            border: 1px solid rgba(125,125,125,0.1); 
        }
        .list-item { 
            border-left: 4px solid var(--secondary); padding: 10px 15px; 
            background: rgba(125,125,125,0.1); 
            border-radius: 8px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        input, select, textarea {
            background-color: var(--card-bg) !important;
            color: var(--text) !important;
            border: 1px solid var(--muted) !important;
        }
    </style>
</head>
<body data-theme="light">

    <div id="auth-screen">
        <div class="auth-card">
            <h3>Қош келдіңіз!</h3>
            <p class="text-muted">Жүйеге кіру үшін есіміңізді жазыңыз</p>
            <input type="text" id="userName" class="form-control mb-3" placeholder="Атыңыз...">
            <button class="btn btn-primary w-100" onclick="login()">Кіру</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <nav class="top-nav">
            <span id="user-greeting">Сәлем!</span>
            <button class="btn btn-sm btn-outline-light" onclick="toggleTheme()">Түн/Күн</button>
        </nav>

        <div class="hero">
            <h2>Басты бет</h2>
            <div class="timer-box" id="clock">00:00:00</div>
        </div>

        <div id="home" class="section-page active">
            <div class="container">
                <div class="row g-3">
                    <div class="col-6">
                        <div class="stat-card" onclick="showPage('tasks')">
                            <h5>Тапсырмалар</h5>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="stat-card" onclick="showPage('glossary')">
                            <h5>Сөздік</h5>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tasks" class="section-page">
            <div class="container">
                <button class="back-btn" onclick="showPage('home')">←</button>
                <div class="s-card">
                    <h3>Менің жоспарым</h3>
                    <div id="schList">
                        <div class="list-item">Курстық жұмыс аяқтау <span>12:00</span></div>
                        <div class="list-item urgent">Маңызды кездесу <span>15:00</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="glossary" class="section-page">
            <div class="container">
                <button class="back-btn" onclick="showPage('home')">←</button>
                <div class="s-card" id="glossaryView">
                    <h3>Терминдер сөздігі</h3>
                    <div class="link-item"><b>HTML</b> - Гипермәтінді белгілеу тілі</div>
                    <div class="link-item"><b>CSS</b> - Каскадты стильдер кестесі</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Жүйеге кіру функциясы
        function login() {
            const name = document.getElementById('userName').value;
            if (name) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('user-greeting').innerText = 'Сәлем, ' + name + '!';
            } else {
                alert('Есіміңізді жазыңыз!');
            }
        }

        // Беттерді ауыстыру функциясы
        function showPage(pageId) {
            document.querySelectorAll('.section-page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
        }

        // Түн режимін ауыстыру
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            body.setAttribute('data-theme', currentTheme === 'light' ? 'dark' : 'light');
        }

        // Уақытты жаңарту
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
